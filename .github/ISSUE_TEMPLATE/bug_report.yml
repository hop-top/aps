name: Bug Report
description: Report a bug in APS
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what the bug is.
      placeholder: Tell us what happened
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `aps profile new test`
        2. Execute `aps test -- echo hello`
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: APS Version
      description: What version of APS are you running?
      placeholder: "aps version"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS and version are you running?
      placeholder: "macOS 14.0, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal
      description: What terminal are you using?
      placeholder: "iTerm2, Terminal.app, Windows Terminal, gnome-terminal"

  - type: checkboxes
    id: search
    attributes:
      label: Search
      options:
        - label: I searched for other issues and couldn't find a duplicate
          required: true
