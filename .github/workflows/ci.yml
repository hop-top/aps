name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26.1']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Configure private modules
        shell: bash
        run: git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dependencies
        run: go mod download
        env:
          GOPRIVATE: hop.top

      - name: Run unit tests with coverage
        shell: bash
        run: go test -v -timeout 5m -coverprofile=coverage.out -covermode=atomic ./tests/unit/...

      - name: Run internal package tests
        shell: bash
        continue-on-error: true
        run: |
          # Test all internal packages except core/isolation (env isolation issues: T-0146)
          # continue-on-error until env isolation is fixed across internal tests (T-0146)
          go test -v -timeout 5m $(go list ./internal/... | grep -v /core/isolation)

      - name: Run E2E tests
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "Skipping E2E tests on Windows due to TUI limitations"
          else
            go test -v -timeout 5m -coverprofile=coverage-e2e.out -covermode=atomic ./tests/e2e
          fi

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ runner.os }}
          path: |
            coverage.out
            coverage-e2e.out
          retention-days: 7
