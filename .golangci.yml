version: "2"

linters:
  enable:
    - bodyclose
    - exhaustive
    - goconst
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - whitespace
    - wrapcheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - wrapcheck
          - gosec
          - goconst
          - noctx
      - path: windows\.go
        linters:
          - gosec

formatters:
  enable:
    - gofumpt
    - goimports

run:
  timeout: 5m
